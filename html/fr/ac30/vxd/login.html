<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX30 — Boarding Registration</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top right, #1b2a4a, #05070f);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 25px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .accent {
      color: #ff7a18;
    }

    p {
      color: #b7c0d6;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 12px;
      text-transform: uppercase;
      color: #8ea0c9;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.3);
      color: white;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff7a18, #ff9b52);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .status {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(255,122,24,0.15);
      color: #ff7a18;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 15px;
    }

    #result {
      margin-top: 15px;
      font-size: 14px;
      color: #b7c0d6;
    }

    @media (max-width: 800px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- INFO -->
    <div class="panel">
      <div class="status">MISSION ACTIVE</div>

      <h1>FLIGHT <span class="accent">AX30</span></h1>

      <p>
        Après 30 ans d’orbite, une nouvelle mission commence.<br>
        Embarquement pour une soirée hors turbulence.
      </p>

      <p>
        📍 Marseille Terminal MRS-30<br>
        🕒 19:30 — 12 Septembre 2026<br>
        🎽 Dress code : Space-grade elegance
      </p>

      <p>
        Un boarding pass PDF sera envoyé après confirmation.
      </p>
    </div>

    <!-- FORM -->
    <div class="panel">

      <h2>Boarding Registration</h2>

      <form id="rsvp">

        <label>Nom</label>
        <input name="name" type="text" required>

        <label>Email</label>
        <input name="email" type="email" required>

        <label>Participation</label>
        <select name="status" required>
          <option value="">Choisir</option>
          <option>Présent</option>
          <option>Présent + invité</option>
          <option>Indisponible</option>
        </select>

        <label>Message</label>
        <textarea name="message"></textarea>

        <button type="submit">Confirm Boarding</button>

      </form>

      <div id="result"></div>

    </div>

  </div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmwvMBldzq_ta7g45wnfKZD16-1KVNWvDwp42iW8r8NIJj3O8jxYdm-yqgQxg70-YKug/exec";

const form = document.getElementById("rsvp");
const result = document.getElementById("result");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const data = {
    name: formData.get("name"),
    email: formData.get("email"),
    status: formData.get("status"),
    message: formData.get("message")
  };

  result.textContent = "Transmission en cours...";

  try {

    await fetch(SCRIPT_URL, {
      method: "POST",
      body: new FormData(form);
    });

    result.textContent = "✔ Boarding confirmed — check your email.";

    form.reset();

  } catch (err) {

    console.error(err);
    result.textContent = "Erreur de transmission.";

  }

});

</script>

</body>
</html>
